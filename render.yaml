services:
  - type: web
    name: los-simpsons-dex-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist/losSimpsonsDex/browser
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
